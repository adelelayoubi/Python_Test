# .github/workflows/ci.yml
name: Python CI Pipeline

# Wann soll die Pipeline starten?
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    # Die virtuelle Umgebung, auf der die Tests laufen
    runs-on: ubuntu-latest

    steps:
    # Schritt 1: Den Code aus dem GitHub-Repository auf den Server auschecken
    - name: Code auschecken
      uses: actions/checkout@v4

    # Schritt 2: Python auf der virtuellen Maschine installieren
    - name: Python einrichten
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
     # Pytest installieren, damit wir Farben bekommen
    - name: Test-Tools installieren
      run: |
        python -m pip install --upgrade pip
        pip install pytest
    # --- SCHRITT 1: DER BUILD ---
    - name: Anwendung bauen und Syntax prüfen (Build)
      run: |
        # Prüft die Datei auf Syntaxfehler ohne sie komplett auszuführen
        python -m py_compile main.py math_functions.py
        # Simuliert den Start der App. Wenn main() abstürzt, schlägt der Build fehl!
        python main.py
    # Schritt 3: Die eigentlichen Tests starten
    - name: Mathematische Tests ausführen
      run: |
        pytest -v --color=yes test_math.py
